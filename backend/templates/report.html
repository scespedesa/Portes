<h2>Incident pour porte {{ porte }}</h2>

<select id="type">
    <option>OUVERTURE NOK</option>
    <option>FERMETURE NOK</option>
</select>

<input id="priorite" placeholder="Priorité">
<textarea id="desc"></textarea>

<button onclick="send()">Envoyer</button>

<script>
function send() {
    fetch("/incidents", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            type_incident: document.getElementById("type").value,
            priorite: document.getElementById("priorite").value,
            description: document.getElementById("desc").value
        })
    })
    .then(() => alert("OK"));
}
</script>
